apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ai-analyzer
  namespace: argocd
  labels:
    app: ai-analyzer
    environment: dev
spec:
  project: default

  source:
    repoURL: https://github.com/lokesh-mateti/ecommerce-gitops.git
    targetRevision: HEAD
    path: apps/ai-analyzer
    helm:
      valueFiles:
        - values.yaml
        - values-dev.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: ecommerce-dev

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 1m
