replicaCount: 3

image:
  repository: "REPLACE_WITH_ECR_REPO_URL/api-gateway"
  tag: "latest"

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 12
  targetCPUUtilizationPercentage: 60

ingress:
  enabled: true
  host: "api.example.com"

resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi
