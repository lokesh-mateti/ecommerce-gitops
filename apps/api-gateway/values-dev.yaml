replicaCount: 1

image:
  repository: "396913737205.dkr.ecr.us-east-1.amazonaws.com/api-gateway"
  tag: 22-d2c3e2d

autoscaling:
  enabled: false

service:
  type: ClusterIP
  port: 80
  targetPort: 8000

ingress:
  enabled: true
  className: alb
  host: ""
  path: /

env:
  - name: APP_NAME
    value: "api-gateway"
  - name: LOG_LEVEL
    value: "info"
  - name: PRODUCT_SERVICE_URL
    value: "http://product-service.ecommerce-dev.svc.cluster.local"
  - name: ORDER_SERVICE_URL
    value: "http://order-service.ecommerce-dev.svc.cluster.local"

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 150m
    memory: 128Mi
