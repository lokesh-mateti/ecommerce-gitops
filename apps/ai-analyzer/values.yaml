replicaCount: 1

image:
  repository: ""
  tag: "latest"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 8000

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 150m
    memory: 128Mi

livenessProbe:
  path: /health
  initialDelaySeconds: 10
  periodSeconds: 15

readinessProbe:
  path: /health
  initialDelaySeconds: 5
  periodSeconds: 10

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 70

ingress:
  enabled: false

env:
  - name: APP_NAME
    value: "ai-analyzer"
  - name: LOG_LEVEL
    value: "info"

# GEMINI_API_KEY is injected via Kubernetes Secret
# Create it manually:
#   kubectl create secret generic ai-analyzer-secret \
#     --from-literal=GEMINI_API_KEY=your-key -n ecommerce-dev
secretName: ai-analyzer-secret

serviceAccount:
  create: true
  name: ""
  annotations: {}

podSecurityContext:
  runAsNonRoot: true
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  runAsUser: 999
  capabilities:
    drop:
      - ALL
